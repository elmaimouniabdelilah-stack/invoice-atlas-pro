  <body>
    <!-- Splash Screen -->
    <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0a0a0b;flex-direction:column;gap:20px;transition:opacity 0.6s ease">
      <div style="display:flex;align-items:center;gap:12px;animation:fadeUp 0.8s ease both">
        <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#2563eb);display:flex;align-items:center;justify-content:center">
          <span style="color:#fff;font-size:22px;font-weight:800;font-family:system-ui">F</span>
        </div>
        <span style="color:#f0f0f0;font-size:26px;font-weight:700;font-family:system-ui;letter-spacing:-0.5px">FacturaPro</span>
      </div>
      <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite"></div>
    </div>
    <style>
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
